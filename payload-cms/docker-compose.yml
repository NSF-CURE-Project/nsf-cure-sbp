# Local dev stack for the Payload CMS service.
# Postgres is the canonical database (see docs/architecture/architecture.md).
# Run from this directory:  docker compose up
#
# Set DATABASE_URI in your .env to point at the `postgres` service:
#   DATABASE_URI=postgresql://sbp:sbp@postgres:5432/sbp

services:
  payload:
    image: node:20-alpine
    ports:
      - '3000:3000'
    volumes:
      - .:/home/node/app
      - node_modules:/home/node/app/node_modules
    working_dir: /home/node/app/
    command: sh -c "corepack enable && corepack prepare pnpm@latest --activate && pnpm install && pnpm dev"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: sbp
      POSTGRES_PASSWORD: sbp
      POSTGRES_DB: sbp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U sbp -d sbp']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  node_modules:
