name: Web App Tests

on:
  pull_request:
    paths:
      - 'web/**'
      - '.github/workflows/web-tests.yml'
  push:
    branches:
      - main
      - dev
      - production
    paths:
      - 'web/**'
      - '.github/workflows/web-tests.yml'

jobs:
  web-quality:
    name: Lint and Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test
