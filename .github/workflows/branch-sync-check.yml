name: Branch Sync Check

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  main-production-sync:
    name: Ensure production is in sync with main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main and production
        run: |
          git fetch origin main production

      - name: Compare branch tips
        run: |
          MAIN_SHA="$(git rev-parse origin/main)"
          PROD_SHA="$(git rev-parse origin/production)"

          echo "main:       $MAIN_SHA"
          echo "production: $PROD_SHA"

          if [ "$MAIN_SHA" != "$PROD_SHA" ]; then
            echo "::error::Branch drift detected: origin/production is not at the same commit as origin/main."
            echo "Promote with: git checkout production && git merge --ff-only origin/main && git push origin production"
            exit 1
          fi

          echo "Branches are in sync."
