name: Branch Sync Check

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:

jobs:
  main-prod-sync:
    name: Ensure prod is in sync with main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main and prod
        run: |
          git fetch origin main prod

      - name: Compare branch tips
        run: |
          MAIN_SHA="$(git rev-parse origin/main)"
          PROD_SHA="$(git rev-parse origin/prod)"

          echo "main:       $MAIN_SHA"
          echo "prod:       $PROD_SHA"

          if [ "$MAIN_SHA" != "$PROD_SHA" ]; then
            echo "::error::Branch drift detected: origin/prod is not at the same commit as origin/main."
            echo "Promote with: git checkout prod && git merge --ff-only origin/main && git push origin prod"
            exit 1
          fi

          echo "Branches are in sync."
