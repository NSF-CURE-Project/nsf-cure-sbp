name: Payload CMS Tests

on:
  pull_request:
    paths:
      - 'payload-cms/**'
      - '.github/workflows/payload-cms-tests.yml'
  push:
    branches:
      - main
      - dev
    paths:
      - 'payload-cms/**'
      - '.github/workflows/payload-cms-tests.yml'

jobs:
  unit-node:
    name: Node Utility Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payload-cms
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run node:test utility suite
        run: node --experimental-strip-types --test tests/unit-node/**/*.test.mjs
